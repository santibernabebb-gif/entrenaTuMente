<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Entrena tu Mente</title>
  <link rel="stylesheet" href="css/main.css?v=7" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- PANTALLA PRINCIPAL -->
  <div id="screen-home" class="screen active">
    <header class="home-header">
      <div class="header-deco"></div>
      <h1 class="app-title">🧠 Entrena<br>tu Mente</h1>
      <p class="app-subtitle">Juegos amables para una mente activa y feliz</p>
    </header>
    <main class="home-main">
      <div class="games-grid" id="games-grid"></div>
      <div class="home-actions">
        <button class="btn-sesion" onclick="App.startQuickSession()">
          <span class="btn-icon">⚡</span>
          <span>Sesión Rápida</span>
          <small>5 minutos de juego variado</small>
        </button>
        <button class="btn-progreso" onclick="App.showScreen('progress')">
          <span class="btn-icon">📊</span>
          <span>Mi Progreso</span>
        </button>
      </div>
    </main>
  </div>

  <!-- PANTALLA DE PROGRESO -->
  <div id="screen-progress" class="screen">
    <div class="game-header">
      <button class="btn-back" onclick="App.showScreen('home')">← Inicio</button>
      <h2>Mi Progreso</h2>
    </div>
    <div class="progress-content" id="progress-content"></div>
  </div>

  <!-- PANTALLA DE JUEGO -->
  <div id="screen-game" class="screen">
    <div class="game-header">
      <button class="btn-back" onclick="App.backFromGame()">← Inicio</button>
      <h2 id="game-title-header">Juego</h2>
    </div>
    <div id="game-container"></div>
  </div>

  <!-- PANTALLA SESIÓN RÁPIDA -->
  <div id="screen-session" class="screen">
    <div class="game-header">
      <button class="btn-back" onclick="App.endSession()">✕ Salir</button>
      <h2>Sesión Rápida</h2>
      <span id="session-counter" class="session-counter">1 / 5</span>
    </div>
    <div id="session-container"></div>
  </div>

  <!-- FEEDBACK OVERLAY -->
  <div id="feedback-overlay" class="feedback-overlay hidden">
    <div class="feedback-box" id="feedback-box">
      <div class="feedback-icon" id="feedback-icon">✅</div>
      <div class="feedback-text" id="feedback-text">¡Muy bien!</div>
    </div>
  </div>

  <!-- SCRIPTS — orden importante -->
  <script src="js/data.js?v=7"></script>
  <script src="js/progress.js?v=7"></script>
  <script src="js/games/shared.js?v=7"></script>
  <script src="js/games/memory.js?v=7"></script>
  <script src="js/games/cual-sobra.js?v=7"></script>
  <script src="js/games/secuencias.js?v=7"></script>
  <script src="js/games/memoria-breve.js?v=7"></script>
  <script src="js/games/asociaciones.js?v=7"></script>
  <script src="js/games/orden-logico.js?v=7"></script>
  <script src="js/games/atencion-visual.js?v=7"></script>
  <script src="js/games/palabras.js?v=7"></script>
  <script src="js/games/categorias.js?v=7"></script>
  <script src="js/session.js?v=7"></script>
  <script src="js/app.js?v=7"></script>
</body>
</html>
